"$schema" = 'https://starship.rs/config-schema.json'

add_newline = false
format = """$directory$character"""
right_format = """${custom.uv}${env_var.APP_ENV}$all"""
scan_timeout = 10

[container]
# Made the container icon purple to match Distrobox
style = 'bold purple dimmed'
format = '[$symbol]($style)'

[character]
success_symbol = '[❯](bold green)'
error_symbol = '[✗](bold red)'
vimcmd_symbol = '[V](bold green)'

[directory]
style = "bold purple dimmed"

[directory.substitutions]
'~/Repos/lkdm' = '~lkdm'

[git_branch]
format = '[$symbol$branch(:$remote_branch)]($style) '

[git_commit]
commit_hash_length = 4
tag_symbol = '🔖 '

[git_status]
stashed = ''
disabled = true # WARN: You can disable this for perf
style = 'bold red'

[line_break]
disabled = true

[package]
format = '[$symbol$version]($style) '
symbol = ""
style = "bold dimmed"

[env_var.APP_ENV]
default = ''
format = '[$env_value]($style) '
style = "bold gray"

[python]
# format = '[${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'
#
# format = """
# ${custom.python_fallback}\
# ${custom.uv}\
# """
disabled = true

[custom.uv]
detect_files = ['.python-version']
command = 'uv python find --show-version'
format = '[uv $symbol$output]($style) '
symbol = "\ue73c "
style = "bold #22C55E"
description = 'uv python'

# [custom.python_fallback]
# # detect_extensions = ['py']
# detect_files = ['pyproject.toml', 'requirements.txt', '!uv.lock']
# when = 'test ! -f uv.lock'
# symbol = "\ue73c "
# command = 'python3 --version'
# format = '[$symbol$output]($style) '
# style = "bold yellow"
# description = 'python fallback'

[nodejs]
format = '[$symbol($version )]($style)'

[bun]
format = '[$symbol($version )]($style)'

[deno]
format = '[$symbol($version )]($style)'

[rust]
format = '[$symbol($version )]($style)'

[dotnet]
format = '[$symbol($version )(🎯 $tfm )]($style)'

[golang]
format = '[$symbol($version )]($style)'

[zig]
format = '[$symbol($version )]($style)'

[odin]
format = '[$symbol($version )]($style)'

[ocaml]
format = '[$symbol($version )(\($switch_indicator$switch_name\) )]($style)'

[lua]
format = '[$symbol($version )]($style)'

[ruby]
format = '[$symbol($version )]($style)'

[php]
format = '[$symbol($version )]($style)'

[terraform]
format = '[$symbol$workspace]($style)'

[kotlin]
format = '[$symbol($version )]($style)'

[haskell]
format = '[$symbol($version )]($style)'

[aws]
format = 'on [$symbol$profile]($style) '
style = 'bold blue'
symbol = '🅰 '
[aws.profile_aliases]
Enterprise_Naming_Scheme-voidstars = 'void**'
